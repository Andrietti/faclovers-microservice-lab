spring.application.name=auth-service
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]
server.port=${SERVER_PORT:${AUTH_SERVICE_PORT:8081}}

spring.datasource.url=${SPRING_DATASOURCE_URL:${AUTH_DB_NAME:jdbc:postgresql://localhost:5433/faclovers_auth}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${AUTH_DB_USER:faclovers}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${AUTH_DB_PASSWORD:faclovers123}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:faclovers_microservices_lab_secret_key_with_at_least_32_chars}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
